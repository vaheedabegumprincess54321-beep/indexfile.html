<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Special Surprise 🎁</title>
<style>
    body {
        margin: 0;
        padding: 0;
        font-family: 'Arial', sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        text-align: center;
        transition: all 0.5s;
    }
    .container {
        background: white;
        padding: 30px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        max-width: 400px;
        transition: all 0.5s;
    }
    img {
        width: 100%;
        border-radius: 10px;
        margin-top: 15px;
        display: none;
    }
    h1 {
        color: #ff4e50;
    }
    p {
        font-size: 16px;
        color: #555;
    }
    button {
        padding: 10px 20px;
        border: none;
        background: #ff4e50;
        color: white;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        margin-top: 15px;
    }
    button:hover {
        background: #e04344;
    }
</style>
</head>

<body>

<div class="container" id="container">
    <h1 id="title">🎁 I have a beautiful surprise for you!</h1>
    <p id="desc">Click the button to see it 👇</p>
    <img id="dog" src="https://images.unsplash.com/photo-1517849845537-4d257902454a" alt="Cute Dog">
    <button id="btn" onclick="nextStep()">Show Surprise</button>
</div>

<script>
let step = 0;
function nextStep() {
    const title = document.getElementById('title');
    const desc = document.getElementById('desc');
    const dog = document.getElementById('dog');
    const btn = document.getElementById('btn');
    const container = document.getElementById('container');

    step++;

    if(step === 1) {
        // Show dog image
        dog.style.display = 'block';
        title.textContent = "Look at this cute dog! 🐶";
        desc.textContent = "Amazing, right? 😍";
        btn.textContent = "Next";
    } else if(step === 2) {
        // April Fool message
        container.style.background = 'black';
        container.style.color = 'white';
        container.innerHTML = `
            <h1 style="font-size:50px;">😂 APRIL FOOL 😂</h1>
            <p style="font-size:20px;">You just got pranked! 😜</p>
        `;
    }
}
</script>

</body>
</html>
